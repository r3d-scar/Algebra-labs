<!DOCTYPE html>
<html>
<head>
    <title>The Boys' Game Hub</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; padding: 20px; }
        .game-card { border: 2px solid #333; padding: 10px; cursor: pointer; background: #222; border-radius: 8px; }
        .game-card:hover { border-color: #00ff00; }
        
        /* Fullscreen Container */
        #game-view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 100; }
        iframe { width: 100%; height: 100%; border: none; }
        .close-btn { position: absolute; top: 10px; right: 10px; padding: 10px; background: red; color: white; cursor: pointer; border: none; border-radius: 5px; }
    </style>
</head>
<body>

    <h1>The Hub</h1>

    <div class="grid">
        <div class="game-card" onclick="launchGame('https://example-game-url.com')">
            <h3>Game Name</h3>
            <p>Click to Play</p>
        </div>
    </div>

    <div id="game-view">
        <button class="close-btn" onclick="closeGame()">Close</button>
        <iframe id="game-frame" src="" allowfullscreen></iframe>
        <button style="position:absolute; bottom:10px; right:10px;" onclick="goFull()">Full Screen</button>
    </div>

    <script>
        function launchGame(url) {
            document.getElementById('game-frame').src = url;
            document.getElementById('game-view').style.display = 'block';
        }

        function closeGame() {
            document.getElementById('game-view').style.display = 'none';
            document.getElementById('game-frame').src = '';
        }

        function goFull() {
            let frame = document.getElementById('game-view');
            if (frame.requestFullscreen) frame.requestFullscreen();
            else if (frame.webkitRequestFullscreen) frame.webkitRequestFullscreen();
        }
    </script>
</body>
</html>
